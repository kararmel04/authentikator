<!DOCTYPE html>
<html>
    <!-- <script src="formulaire.js"></script> -->
     <head>
        <script src="qrcode_display.js"></script>
        <style>
/* Style the Image Used to Trigger the Modal */
#qr {
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

#qr:hover {opacity: 0.7;}

/* The Modal (background) */
.modal {
  display: none; /* Hidden by default */
  position: fixed; /* Stay in place */
  z-index: 1; /* Sit on top */
  padding-top: 100px; /* Location of the box */
  left: 0;
  top: 0;
  width: 100%; /* Full width */
  height: 100%; /* Full height */
  overflow: auto; /* Enable scroll if needed */
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
}

/* Modal Content (Image) */
.modal-content {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 700px;
}

/* Caption of Modal Image (Image Text) - Same Width as the Image */
#caption {
  margin: auto;
  display: block;
  width: 80%;
  max-width: 700px;
  text-align: center;
  color: #ccc;
  padding: 10px 0;
  height: 150px;
}

/* Add Animation - Zoom in the Modal */
.modal-content, #caption {
  animation-name: zoom;
  animation-duration: 0.6s;
}

@keyframes zoom {
  from {transform:scale(0)}
  to {transform:scale(1)}
}

/* The Close Button */
.close {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 40px;
  font-weight: bold;
  transition: 0.3s;
}

.close:hover,
.close:focus {
  color: #bbb;
  text-decoration: none;
  cursor: pointer;
}

/* 100% Image Width on Smaller Screens */
@media only screen and (max-width: 700px){
  .modal-content {
    width: 100%;
  }
}
        </style>
     </head>
    <body>
        <img id="qr" alt=" " title="QR Code OTP" height="100px" width="100px">
        <!-- The Modal -->
        <div id="myModal" class="modal">
            <!-- The Close Button -->
            <span class="close">&times;</span>
            <!-- Modal Content (The Image) -->
            <img class="modal-content" id="imgmodal">
            <!-- Modal Caption (Image Text) -->
            <div id="caption">Vous avez 15 secondes pour prendre en photo le QR code</div>
        </div>

        <form method="post">
        <label for="login">login</label><br>
        <input type="text" id="login" name="login"><br>
        <label for="password">password</label><br>
        <input type="password" id="password" name="password"><br>
        <input type="submit" value="Submit"><br>
        
        <a href="connexionA2F.html">se connecter avec OTP</a>
    </form>
    </body>
</html>
